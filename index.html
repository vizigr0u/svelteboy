<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#611642">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />

  <script>
    // Configure coi-serviceworker before it loads. Credentialless mode keeps cross-origin
    // assets loadable without CORP headers under COEP. Reload-on-activate is required because
    // COOP/COEP only apply once the SW controls the page.
    window.coi = {
      coepCredentialless: () => true,
      coepDegrade: () => true,
      doReload: () => window.location.reload(),
    };
  </script>
  <script src="./coi-serviceworker.js"></script>
  <title>SvelteBoy</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
