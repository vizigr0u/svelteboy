name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['dev']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Backend tests (asbuild:debug + node tests)
        run: pnpm test
      - name: Web tests (vitest)
        run: pnpm test:web
      - name: Release build smoke test
        run: pnpm asbuild:release
